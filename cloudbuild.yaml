steps:
  # 1. Construir la imagen de Docker (Etapa de compilación y entorno)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build'
    args: [
      'build', 
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/backend-repo/notas-backend:$COMMIT_SHA', 
      '.'
    ]

  # 2. Ejecutar Pruebas Unitarias dentro del contenedor recién construido
  # Si este paso falla (exit code != 0), todo el build se cancela y no hay despliegue.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Test'
    args: [
      'run',
      'us-central1-docker.pkg.dev/$PROJECT_ID/backend-repo/notas-backend:$COMMIT_SHA',
      'npm', 'test'
    ]

  # 3. Subir la imagen al Artifact Registry (Solo si los tests pasaron)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push'
    args: [
      'push', 
      'us-central1-docker.pkg.dev/$PROJECT_ID/backend-repo/notas-backend:$COMMIT_SHA'
    ]

  # 4. Desplegar en Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'notas-arranca-backend'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/backend-repo/notas-backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--vpc-connector'
      - 'notas-vpc-connector'
      - '--add-cloudsql-instances'
      - 'sunny-studio-481512-a5:us-central1:notas-db-instance'
      - '--set-env-vars'
      - 'NODE_ENV=production,REDIS_HOST=10.118.147.211,REDIS_PORT=6379,DB_HOST=/cloudsql/sunny-studio-481512-a5:us-central1:notas-db-instance,FRONTEND_URL=https://prueba-tecnca-arranca-front.vercel.app'
      - '--set-secrets'
      - 'JWT_SECRET=JWT_SECRET:latest,DB_PASSWORD=DB_PASSWORD:latest,DB_USER=DB_USER:latest,DB_NAME=DB_NAME:latest'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/backend-repo/notas-backend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
